services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: regional-data-postgis
    environment:
      POSTGRES_USER: regional
      POSTGRES_PASSWORD: regional
      POSTGRES_DB: regional_data
    ports:
      - "5437:5432"
    volumes:
      - regional_postgis_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  regional_postgis_data:
